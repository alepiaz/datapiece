name: CI

on:
  push:
    branches: [main]
    paths:
      - "datapiece/**"
      - "tests/**"
  pull_request:
    branches: [main]
    paths:
      - "datapiece/**"
      - "tests/**"

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Lint with pylint
        run: pylint datapiece

      - name: Lint with flake8
        run: flake8 datapiece tests

  type-check:
    name: Type Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Type check with mypy
        run: mypy datapiece

  test:
    name: Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Run tests with coverage
        run: pytest --cov=datapiece --cov-fail-under=80 --cov-report=xml tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
